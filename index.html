<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4D Hypercube (3×3×3×3) – Zoomable</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>🌀 4D HYPERCUBE (3×3×3×3) – ZOOMABLE 🌀</h1>
<div class="sub">80 pieces | 6 rotation planes | click a cell to zoom in</div>

<div class="controls" id="movePanel"></div>

<div class="controls">
    <button id="scrambleBtn">🎲 Scramble (20)</button>
    <button id="resetBtn">🔁 Reset</button>
    <button id="undoBtn">↩️ Undo</button>
</div>

<!-- Main grid view -->
<div id="dashboard" class="dashboard"></div>

<!-- Zoomed view -->
<div id="zoomedView" class="zoomed-container">
    <div class="zoomed-main">
        <div class="zoomed-header">
            <div class="zoomed-title" id="zoomedTitle">Cell A</div>
            <button class="back-btn" id="backBtn">← Back to All Cells</button>
        </div>
        <div class="cross-layout" id="crossLayout"></div>
    </div>
    <div class="sidebar">
        <div class="sidebar-title">Other Cells</div>
        <div id="sidebarCells"></div>
    </div>
</div>

<div id="logPanel" class="log">📋 Ready. Click any cell to zoom in.</div>
<div class="footer">Each colored square = sticker. Color = piece's home cell. Moves rotate 4D coordinates.</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
